engine_name = "chemcloud"
program = "crest"
path_min_method = "neb"
chemcloud_queue = "cpu"
write_qcio = false
print_stdout = false
qcop_local_parallel_workers = 12

[path_min_inputs]
climb = true
en_thre = 0.0001
rms_grad_thre = 0.005
max_rms_grad_thre = 0.03
skip_identical_graphs = true
disable_molecular_graphs = false
ts_grad_thre = 0.001
ts_spring_thre = 0.01
barrier_thre = 0.1
early_stop_force_thre = 0.01
use_geodesic_tangent = false
do_elem_step_checks = true
adaptive_resolution = true
adaptive_segment_ratio = 2.0
adaptive_energy_ratio = 2.0
adaptive_use_energy = true
adaptive_max_images = 50
adaptive_cooldown_steps = 5
adaptive_plateau_window = 3
adaptive_plateau_rtol = 0.05
validate_minima_with_hessian = false
hessian_minimum_frequency_cutoff = 0.0
hessian_minima_rescue_displacement = 0.1
network_completion_max_followup_requests = 1000
recursive_split_max_depth = 200
recursive_same_pair_split_limit = 5
max_steps = 1000
v = true

[chain_inputs]
k = 0.05
delta_k = 0.0
do_parallel = true
use_geodesic_interpolation = true
node_freezing = true
fraction_freeze = 0.1
node_rms_thre = 5.0
node_ene_thre = 5.0
frozen_atom_indices = ""

[gi_inputs]
nimages = 7
friction = 0.01
nudge = 0.1
random_seed = 0
align = true

[gi_inputs.extra_kwds]

[program_kwds]
cmdline_args = []

[program_kwds.keywords]
threads = 1

[program_kwds.extras]

[program_kwds.files]

[program_kwds.model]
method = "gfn2"
basis = "gfn2"

[program_kwds.model.extras]

[optimizer_kwds]
name = "gd"
timestep = 1.0
max_step_norm = 2.0
